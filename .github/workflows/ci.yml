name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # pyyaml + pytest are all the tests need. The stage-3 LLM judge is
        # fail-open: with no ANTHROPIC_API_KEY set it passes headlines through
        # untouched, so the suite runs green without any secret.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        # No secrets/env: ANTHROPIC_API_KEY is intentionally absent.
        run: pytest -q
